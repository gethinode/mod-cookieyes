[module]
  [module.hugoVersion]
    extended = true
    min = "0.110.0"
    max = ""
  [[module.mounts]]
    source = 'assets'
    target = 'assets'
  [[module.mounts]]
    source = 'i18n'
    target = 'i18n'
  [[module.mounts]]
    source = 'layouts'
    target = 'layouts'

[params.modules.cookieyes]
  integration = "critical"
  # Warm up the connection to the CookieYes CDN so the render-blocking consent script
  # (which must stay synchronous for prior-consent auto-blocking) starts downloading sooner.
  preconnect = ["https://cdn-cookieyes.com"]

[params.modules.cookieyes.csp]
  script-src = ["cdn-cookieyes.com"]
  connect-src = [
    "*.cookieyes.com",
    "cdn-cookieyes.com"
  ]
  img-src = ["cdn-cookieyes.com"]
  style-src = ["'unsafe-inline'"]
